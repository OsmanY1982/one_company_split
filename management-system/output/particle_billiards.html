<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>粒子撞球 · 益智原型</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a14;
    display: flex; justify-content: center; align-items: center;
    height: 100vh; overflow: hidden;
    font-family: 'SF Mono', 'Cascadia Code', monospace;
    color: #ccc;
  }
  #wrap { text-align: center; }
  canvas {
    display: block; margin: 0 auto;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(80,120,255,0.15);
    cursor: crosshair;
    background: radial-gradient(ellipse at center, #111122 0%, #080810 100%);
  }
  #info {
    margin-top: 12px; font-size: 14px; color: #889;
    display: flex; justify-content: center; gap: 30px;
  }
  #info span { color: #aaf; font-weight: bold; }
  #msg {
    margin-top: 8px; height: 20px; font-size: 13px;
    color: #6a6; transition: color 0.3s;
  }
  button {
    margin-top: 10px; padding: 8px 24px;
    background: #223; color: #aaf; border: 1px solid #335;
    border-radius: 6px; cursor: pointer; font-size: 13px;
    font-family: inherit;
  }
  button:hover { background: #334; color: #ccf; }
  .rule { margin-top: 12px; font-size: 11px; color: #556; line-height: 1.6; }
  .rule b { color: #778; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="info">剩余粒子: <span id="remain">0</span> | 可用画线: <span id="lines">0</span> | 分数: <span id="score">0</span></div>
  <div id="msg"></div>
  <button onclick="resetGame()">重新生成</button>
  <div class="rule">
    <b>操作：</b>拖动鼠标画直线（松手生效）| <b>规则：</b>同色粒子碰撞 → 消除得分 | <b>目标：</b>在可用画线次数内清空全部粒子<br>
    <b>镜子</b>灰色⚪可反弹粒子（用过即消失）
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = 600, H = 500;
canvas.width = W; canvas.height = H;

// --- 游戏状态 ---
let particles = [];
let mirrors = [];
let walls = [];          // 玩家画的线 [{x1,y1,x2,y2, life}, ...]
let score = 0;
let linesLeft = 0;
let drawStart = null;
let mousePos = null;

const COLORS = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff922b', '#cc5de8'];
const RADIUS = 12;
const SPEED = 1.2;

// --- 粒子 ---
class Particle {
  constructor(x, y, vx, vy, color) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.color = color;
    this.r = RADIUS;
    this.alive = true;
  }
  update() {
    if (!this.alive) return;
    this.x += this.vx;
    this.y += this.vy;

    // 边界反弹
    if (this.x - this.r < 0) { this.x = this.r; this.vx *= -1; }
    if (this.x + this.r > W) { this.x = W - this.r; this.vx *= -1; }
    if (this.y - this.r < 0) { this.y = this.r; this.vy *= -1; }
    if (this.y + this.r > H) { this.y = H - this.r; this.vy *= -1; }

    // 墙反弹
    for (let w of walls) {
      if (w.life <= 0) continue;
      const d = distToSegment(this.x, this.y, w.x1, w.y1, w.x2, w.y2);
      if (d < this.r) {
        // 反射
        const wx = w.x2 - w.x1, wy = w.y2 - w.y1;
        const len = Math.hypot(wx, wy);
        const nx = -wy / len, ny = wx / len; // 法向量
        const dot = this.vx * nx + this.vy * ny;
        this.vx -= 2 * dot * nx;
        this.vy -= 2 * dot * ny;
        // 推开
        const pushDist = this.r - d + 1;
        this.x += nx * pushDist;
        this.y += ny * pushDist;
      }
    }

    // 镜子反弹
    for (let i = mirrors.length - 1; i >= 0; i--) {
      const m = mirrors[i];
      if (!m.alive) continue;
      const dx = this.x - m.x, dy = this.y - m.y;
      const dist = Math.hypot(dx, dy);
      if (dist < this.r + m.r) {
        // 反射
        const nx = dx / dist, ny = dy / dist;
        const dot = this.vx * nx + this.vy * ny;
        if (dot > 0) continue; // 正在远离
        this.vx -= 2 * dot * nx;
        this.vy -= 2 * dot * ny;
        this.x = m.x + nx * (this.r + m.r + 1);
        this.y = m.y + ny * (this.r + m.r + 1);
        m.alive = false;
        mirrors.splice(i, 1);
      }
    }
  }
}

function distToSegment(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const len2 = dx * dx + dy * dy;
  if (len2 === 0) return Math.hypot(px - x1, py - y1);
  let t = ((px - x1) * dx + (py - y1) * dy) / len2;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
}

// --- 碰撞检测 ---
function checkCollisions() {
  let anyCollision = false;
  for (let i = 0; i < particles.length; i++) {
    if (!particles[i].alive) continue;
    for (let j = i + 1; j < particles.length; j++) {
      if (!particles[j].alive) continue;
      const a = particles[i], b = particles[j];
      const dx = a.x - b.x, dy = a.y - b.y;
      const dist = Math.hypot(dx, dy);
      if (dist < a.r + b.r && a.color === b.color) {
        a.alive = false;
        b.alive = false;
        score += 100;
        anyCollision = true;
        // 粒子消失特效
        spawnBurst((a.x + b.x) / 2, (a.y + b.y) / 2, a.color);
      }
    }
  }
  // 清理
  particles = particles.filter(p => p.alive);
  if (anyCollision) checkCollisions(); // 连锁
}

// --- 消失特效 ---
let burstParticles = [];
function spawnBurst(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI * 2 * i) / 8;
    burstParticles.push({
      x, y, vx: Math.cos(angle) * 2, vy: Math.sin(angle) * 2,
      life: 20, color
    });
  }
}

// --- 画线 ---
canvas.addEventListener('mousedown', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  drawStart = {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY
  };
});

canvas.addEventListener('mousemove', (e) => {
  if (!drawStart) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  mousePos = {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY
  };
});

canvas.addEventListener('mouseup', (e) => {
  if (!drawStart || !mousePos || linesLeft <= 0) {
    drawStart = null;
    mousePos = null;
    return;
  }
  const dx = mousePos.x - drawStart.x;
  const dy = mousePos.y - drawStart.y;
  if (Math.hypot(dx, dy) < 20) {
    drawStart = null; mousePos = null;
    return; // 太短不算
  }
  walls.push({
    x1: drawStart.x, y1: drawStart.y,
    x2: mousePos.x, y2: mousePos.y,
    life: 180 // 3秒
  });
  linesLeft--;
  drawStart = null;
  mousePos = null;
  updateUI();
  setMsg('墙壁已放置！');
});

// 触屏支持
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const t = e.touches[0];
  drawStart = {
    x: (t.clientX - rect.left) * scaleX,
    y: (t.clientY - rect.top) * scaleY
  };
});

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!drawStart) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const t = e.touches[0];
  mousePos = {
    x: (t.clientX - rect.left) * scaleX,
    y: (t.clientY - rect.top) * scaleY
  };
});

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (!drawStart || !mousePos || linesLeft <= 0) {
    drawStart = null; mousePos = null; return;
  }
  const dx = mousePos.x - drawStart.x;
  const dy = mousePos.y - drawStart.y;
  if (Math.hypot(dx, dy) < 20) {
    drawStart = null; mousePos = null; return;
  }
  walls.push({
    x1: drawStart.x, y1: drawStart.y,
    x2: mousePos.x, y2: mousePos.y,
    life: 180
  });
  linesLeft--;
  drawStart = null; mousePos = null;
  updateUI();
  setMsg('墙壁已放置！');
});

// --- 生成关卡 ---
function generateLevel() {
  particles = [];
  mirrors = [];
  walls = [];
  burstParticles = [];
  score = 0;

  const colorCount = 3 + Math.floor(Math.random() * 2); // 3-4色
  const pairCount = 2 + Math.floor(Math.random() * 3);  // 2-4对
  const totalParticles = pairCount * 2;

  const usedColors = [];
  const pool = [...COLORS];
  for (let i = 0; i < colorCount; i++) {
    const idx = Math.floor(Math.random() * pool.length);
    usedColors.push(pool.splice(idx, 1)[0]);
  }

  const margin = 80;
  for (let i = 0; i < totalParticles; i++) {
    const color = usedColors[i % usedColors.length];
    let x, y;
    let tries = 0;
    do {
      x = margin + Math.random() * (W - 2 * margin);
      y = margin + Math.random() * (H - 2 * margin);
      tries++;
    } while (tries < 50 && particles.some(p => Math.hypot(p.x - x, p.y - y) < RADIUS * 4));

    const angle = Math.random() * Math.PI * 2;
    const speed = SPEED * (0.7 + Math.random() * 0.6);
    particles.push(new Particle(x, y, Math.cos(angle) * speed, Math.sin(angle) * speed, color));
  }

  // 镜子
  const mirrorCount = 1 + Math.floor(Math.random() * 3);
  for (let i = 0; i < mirrorCount; i++) {
    let mx, my;
    let tries = 0;
    do {
      mx = margin + Math.random() * (W - 2 * margin);
      my = margin + Math.random() * (H - 2 * margin);
      tries++;
    } while (tries < 30 && (
      particles.some(p => Math.hypot(p.x - mx, p.y - my) < RADIUS * 4) ||
      mirrors.some(m => Math.hypot(m.x - mx, m.y - my) < 20)
    ));
    mirrors.push({ x: mx, y: my, r: 8, alive: true });
  }

  linesLeft = totalParticles + 1;

  updateUI();
  setMsg('');
}

function resetGame() {
  generateLevel();
}

// --- UI ---
function updateUI() {
  document.getElementById('remain').textContent = particles.filter(p => p.alive).length;
  document.getElementById('lines').textContent = linesLeft;
  document.getElementById('score').textContent = score;
}

function setMsg(text) {
  const el = document.getElementById('msg');
  el.textContent = text;
  if (text.includes('关')) el.style.color = '#ffd93d';
  else if (text.includes('清')) el.style.color = '#6bcb77';
  else el.style.color = '#6a6';
}

// --- 渲染 ---
function draw() {
  ctx.clearRect(0, 0, W, H);

  // 网格背景
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // 镜子
  for (const m of mirrors) {
    if (!m.alive) continue;
    ctx.beginPath();
    ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(180,180,200,0.5)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(200,200,220,0.7)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // 墙
  for (const w of walls) {
    if (w.life <= 0) continue;
    const alpha = Math.min(1, w.life / 60);
    ctx.beginPath();
    ctx.moveTo(w.x1, w.y1);
    ctx.lineTo(w.x2, w.y2);
    ctx.strokeStyle = `rgba(100,200,255,${alpha * 0.8})`;
    ctx.lineWidth = 3;
    ctx.shadowColor = `rgba(100,200,255,${alpha * 0.4})`;
    ctx.shadowBlur = 10;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // 粒子
  for (const p of particles) {
    if (!p.alive) continue;
    // 辉光
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * 1.5, 0, Math.PI * 2);
    ctx.fillStyle = p.color + '20';
    ctx.fill();

    // 主体
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    const grad = ctx.createRadialGradient(p.x - 3, p.y - 3, p.r * 0.1, p.x, p.y, p.r);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.3, p.color);
    grad.addColorStop(1, p.color + '88');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = p.color;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // 爆炸粒子
  for (let i = burstParticles.length - 1; i >= 0; i--) {
    const bp = burstParticles[i];
    bp.x += bp.vx;
    bp.y += bp.vy;
    bp.life--;
    if (bp.life <= 0) { burstParticles.splice(i, 1); continue; }
    const alpha = bp.life / 20;
    ctx.beginPath();
    ctx.arc(bp.x, bp.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = bp.color + Math.floor(alpha * 255).toString(16).padStart(2, '0');
    ctx.fill();
  }

  // 正在画的线
  if (drawStart && mousePos && linesLeft > 0) {
    ctx.beginPath();
    ctx.moveTo(drawStart.x, drawStart.y);
    ctx.lineTo(mousePos.x, mousePos.y);
    ctx.setLineDash([6, 4]);
    ctx.strokeStyle = 'rgba(100,200,255,0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

// --- 主循环 ---
function gameLoop() {
  for (const p of particles) p.update();
  checkCollisions();

  // 墙衰减
  for (let i = walls.length - 1; i >= 0; i--) {
    walls[i].life--;
    if (walls[i].life <= 0) walls.splice(i, 1);
  }

  updateUI();

  const alive = particles.filter(p => p.alive).length;
  if (alive === 0 && score > 0) {
    setMsg('过关！所有粒子已消除');
  }

  draw();
  requestAnimationFrame(gameLoop);
}

generateLevel();
gameLoop();
</script>
</body>
</html>
